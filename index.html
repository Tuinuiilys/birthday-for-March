<!DOCTYPE html>
<html lang="th">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Happy Birthday คุณมีนา</title>

<link href="https://fonts.googleapis.com/css2?family=Sriracha&family=Prompt:wght@300;400&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:linear-gradient(135deg,#ffd6ec,#ffeaf6);
font-family:'Prompt',sans-serif;
text-align:center;
overflow:hidden;
}

h1{
font-family:'Sriracha';
font-size:52px;
color:#ff2d75;
margin-top:30px;
}

.gallery img{
width:200px;
height:200px;
border-radius:50%;
object-fit:cover;
border:6px solid white;
box-shadow:0 10px 30px rgba(0,0,0,.2);
}

button{
padding:10px 20px;
border:none;
border-radius:25px;
background:#ff4f9f;
color:white;
margin:6px;
cursor:pointer;
}

.cake{
font-size:80px;
margin-top:10px;
}

.candles span{
font-size:30px;
margin:2px;
}

.heart{
position:absolute;
color:#ff4f9f;
font-size:22px;
animation:fly 2s forwards;
}

@keyframes fly{
0%{transform:scale(.5)}
100%{transform:translateY(-200px) scale(1.8);opacity:0}
}

canvas{
position:fixed;
top:0;
left:0;
pointer-events:none;
}

.star{
position:absolute;
color:gold;
font-size:18px;
animation:twinkle 2s infinite;
}

@keyframes twinkle{
0%,100%{opacity:.3}
50%{opacity:1}
}

.confetti{
position:absolute;
width:6px;
height:6px;
animation:fall 3s linear forwards;
}

@keyframes fall{
to{transform:translateY(500px) rotate(720deg)}
}

</style>

</head>

<body>

<h1>Happy Birthday 🎂</h1>
<h2>คุณมีนา</h2>

<div class="gallery">
<img id="photo" src="meena1.jpg">
</div>

<br>

<div class="cake">🎂</div>
<div class="candles" id="candles"></div>

<button onclick="blow()">🎤 เป่าเทียน</button>
<button onclick="heartBurst()">💘 ส่งหัวใจ</button>
<button onclick="openGift()">🎁 เปิดของขวัญ</button>
<button onclick="playMusic()">🎵 เปิดเพลง</button>
<button onclick="startGame()">🎮 Mini Game</button>

<div>Score: <span id="score">0</span></div>

<audio id="music">
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_5c7d4d2f6c.mp3?filename=birthday-party-112194.mp3">
</audio>

<canvas id="fireworks"></canvas>

<script>

/* gallery */

let images=["meena1.jpg","meena2.jpg","meena3.jpg"];
let index=0;

setInterval(()=>{
index=(index+1)%images.length;
document.getElementById("photo").src=images[index];
},3000);

/* candles */

let candles=document.getElementById("candles");

for(let i=0;i<6;i++){
let s=document.createElement("span");
s.innerHTML="🕯";
candles.appendChild(s);
}

/* blow candle */

function blow(){
document.querySelectorAll("#candles span")
.forEach(c=>c.innerHTML="💨");
}

/* hearts */

function heartBurst(){

let rect=document.getElementById("photo").getBoundingClientRect();

for(let i=0;i<30;i++){

let h=document.createElement("div");

h.className="heart";

h.innerHTML="❤";

h.style.left=rect.left+rect.width/2+"px";

h.style.top=rect.top+rect.height/2+"px";

document.body.appendChild(h);

setTimeout(()=>h.remove(),2000);

}

}

/* confetti */

function openGift(){

for(let i=0;i<100;i++){

let c=document.createElement("div");

c.className="confetti";

c.style.left=Math.random()*window.innerWidth+"px";

c.style.background=`hsl(${Math.random()*360},80%,60%)`;

document.body.appendChild(c);

setTimeout(()=>c.remove(),3000);

}

startFireworks();

}

/* music */

function playMusic(){
document.getElementById("music").play();
}

/* mini game */

let score=0;

function startGame(){

let heart=document.createElement("div");

heart.className="heart";

heart.innerHTML="💖";

heart.style.left=Math.random()*window.innerWidth+"px";

heart.style.top=Math.random()*window.innerHeight+"px";

heart.onclick=()=>{

score++;

document.getElementById("score").innerText=score;

heart.remove();

};

document.body.appendChild(heart);

}

/* fireworks */

const canvas=document.getElementById("fireworks");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];

function startFireworks(){

setInterval(()=>{

for(let i=0;i<40;i++){

particles.push({

x:Math.random()*canvas.width,
y:Math.random()*canvas.height/2,
vx:(Math.random()-0.5)*6,
vy:(Math.random()-0.5)*6,
life:80,
color:`hsl(${Math.random()*360},100%,60%)`

});

}

},1000);

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

particles.forEach((p,i)=>{

p.x+=p.vx;
p.y+=p.vy;
p.life--;

ctx.fillStyle=p.color;

ctx.beginPath();
ctx.arc(p.x,p.y,3,0,Math.PI*2);
ctx.fill();

if(p.life<=0)particles.splice(i,1);

});

requestAnimationFrame(draw);

}

draw();

/* stars */

setInterval(()=>{

let star=document.createElement("div");

star.className="star";

star.innerHTML="✨";

star.style.left=Math.random()*100+"vw";
star.style.top=Math.random()*100+"vh";

document.body.appendChild(star);

setTimeout(()=>star.remove(),2000);

},200);

</script>

</body>
</html>
