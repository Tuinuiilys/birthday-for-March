<!DOCTYPE html>
<html lang="th">
<head>

<meta charset="UTF-8">
<title>Happy Birthday คุณมีนา</title>

<link href="https://fonts.googleapis.com/css2?family=Sriracha&family=Prompt:wght@300;400&family=Pacifico&display=swap" rel="stylesheet">

<style>

body{
margin:0;
height:100vh;
background:linear-gradient(135deg,#ffd6ec,#ffeaf6);
display:flex;
justify-content:center;
align-items:center;
text-align:center;
font-family:'Prompt',sans-serif;
overflow:hidden;
}

/* กล่องหลัก */

.container{
animation:fadeIn 1.5s ease;
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(20px)}
to{opacity:1}
}

/* รูป */

.photo{
width:260px;
height:260px;
border-radius:50%;
object-fit:cover;
border:8px solid white;
box-shadow:0 15px 40px rgba(0,0,0,0.25);
margin-bottom:25px;
animation:float 4s ease-in-out infinite;
}

@keyframes float{
0%,100%{transform:translateY(0)}
50%{transform:translateY(-12px)}
}

/* หัวข้อ */

.title{
font-family:'Pacifico';
font-size:60px;
color:#ff2d75;
margin-bottom:0;
}

.subtitle{
font-family:'Sriracha';
font-size:38px;
color:#ff4f9f;
margin-top:5px;
}

/* เค้ก */

.cake{
font-size:110px;
animation:bounce 1.2s infinite alternate;
}

@keyframes bounce{
from{transform:translateY(0)}
to{transform:translateY(-18px)}
}

/* ปุ่ม */

button{
padding:12px 30px;
font-size:18px;
border:none;
border-radius:30px;
background:#ff4f9f;
color:white;
cursor:pointer;
margin:10px;
transition:.3s;
box-shadow:0 5px 15px rgba(0,0,0,.2);
}

button:hover{
background:#ff2d75;
transform:scale(1.1);
}

/* popup */

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.4);
display:flex;
justify-content:center;
align-items:center;
visibility:hidden;
opacity:0;
transition:.4s;
}

.popup.active{
visibility:visible;
opacity:1;
}

.popup-box{
background:white;
padding:30px;
border-radius:20px;
width:320px;
text-align:center;
box-shadow:0 15px 40px rgba(0,0,0,.3);
animation:pop .4s;
}

@keyframes pop{
from{transform:scale(.6)}
to{transform:scale(1)}
}

.popup-box h3{
font-family:'Sriracha';
color:#ff2d75;
}

/* hearts */

.heart{
position:absolute;
color:#ff4f9f;
font-size:20px;
animation:floatHeart 6s linear infinite;
}

@keyframes floatHeart{
0%{transform:translateY(100vh);opacity:0}
100%{transform:translateY(-10vh);opacity:1}
}

/* stars */

.star{
position:absolute;
color:gold;
font-size:18px;
animation:twinkle 2s infinite;
}

@keyframes twinkle{
0%,100%{opacity:.3}
50%{opacity:1}
}

</style>

</head>

<body>

<div class="container">

<img class="photo" src="meena1.jpg">

<h1 class="title">Happy Birthday 🎂</h1>

<h2 class="subtitle">คุณมีนา</h2>

<div class="cake">🎂</div>

<p>ลองเป่าเทียนดูสิ</p>

<button onclick="openPopup()">เปิดจดหมาย 💌</button>

<button onclick="playMusic()">เปิดเพลง 🎵</button>

</div>

<!-- popup -->

<div class="popup" id="popup">

<div class="popup-box">

<h3>ถึงคุณมีนา 💖</h3>

<p>

สุขสันต์วันเกิดนะ 🎂  
ขอให้ปีนี้เป็นปีที่ดีสำหรับคุณ  
มีรอยยิ้มเยอะ ๆ  
มีความสุขมาก ๆ  

ขอบคุณที่เข้ามาในชีวิตเรานะ :)

</p>

<button onclick="closePopup()">ปิด</button>

</div>

</div>

<iframe id="music" width="0" height="0" allow="autoplay"></iframe>

<script>

/* popup */

function openPopup(){
document.getElementById("popup").classList.add("active");
}

function closePopup(){
document.getElementById("popup").classList.remove("active");
}

/* เพลง */

function playMusic(){
document.getElementById("music").src="https://www.youtube.com/embed/IpFX2vq8HKw?autoplay=1";
}

/* hearts */

function createHeart(){

const heart=document.createElement("div");
heart.classList.add("heart");
heart.innerHTML="❤";

heart.style.left=Math.random()*100+"vw";
heart.style.fontSize=(Math.random()*20+20)+"px";

document.body.appendChild(heart);

setTimeout(()=>heart.remove(),6000);

}

setInterval(createHeart,400);

/* stars */

function createStar(){

const star=document.createElement("div");
star.classList.add("star");
star.innerHTML="✨";

star.style.left=Math.random()*100+"vw";
star.style.top=Math.random()*100+"vh";

document.body.appendChild(star);

setTimeout(()=>star.remove(),2000);

}

setInterval(createStar,300);

</script>

</body>
</html>
