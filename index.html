<!DOCTYPE html>
<html lang="th">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Birthday คุณมีนา</title>

<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Sriracha&family=Prompt:wght@300;400&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Prompt',sans-serif;
text-align:center;
overflow:hidden;

background:linear-gradient(-45deg,#ffd6ec,#ffeaf6,#ffc2de,#ffe0f2);
background-size:400% 400%;
animation:bgmove 10s infinite linear;
}

@keyframes bgmove{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

/* container */

.container{
max-width:900px;
width:90%;
margin:auto;
padding-top:60px;
}

/* photo */

.photo{
width:260px;
height:260px;
border-radius:50%;
object-fit:cover;
border:8px solid white;
box-shadow:0 0 30px rgba(255,0,120,.5);
animation:float 4s ease-in-out infinite;
}

@keyframes float{
0%,100%{transform:translateY(0)}
50%{transform:translateY(-12px)}
}

/* titles */

.title{
font-family:'Pacifico';
font-size:60px;
color:#ff2d75;
}

.subtitle{
font-family:'Sriracha';
font-size:36px;
color:#ff4f9f;
}

/* cake */

.cake{
font-size:100px;
animation:bounce 1s infinite alternate;
}

@keyframes bounce{
from{transform:translateY(0)}
to{transform:translateY(-15px)}
}

/* buttons */

button{
padding:12px 28px;
font-size:18px;
border:none;
border-radius:30px;
background:#ff4f9f;
color:white;
cursor:pointer;
margin:10px;
transition:.3s;
}

button:hover{
background:#ff2d75;
transform:scale(1.1);
}

/* popup */

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.6);
display:flex;
justify-content:center;
align-items:center;
visibility:hidden;
opacity:0;
transition:.4s;
}

.popup.active{
visibility:visible;
opacity:1;
}

.popup-box{
background:white;
padding:40px;
border-radius:20px;
width:90%;
max-width:420px;
animation:pop .4s;
}

@keyframes pop{
from{transform:scale(.6)}
to{transform:scale(1)}
}

.popup-box h2{
font-family:'Pacifico';
color:#ff2d75;
}

/* floating hearts */

.heart{
position:absolute;
color:#ff4f9f;
animation:floatHeart 6s linear infinite;
}

@keyframes floatHeart{
0%{transform:translateY(100vh);opacity:0}
100%{transform:translateY(-10vh);opacity:1}
}

/* responsive */

@media (max-width:768px){

.photo{
width:180px;
height:180px;
}

.title{
font-size:42px;
}

.subtitle{
font-size:26px;
}

.cake{
font-size:80px;
}

button{
font-size:16px;
}

}

</style>

</head>

<body>

<div class="container">

<img src="meena1.jpg" class="photo">

<h1 class="title">Happy Birthday 🎂</h1>

<h2 class="subtitle">คุณมีนา</h2>

<div class="cake">🎂</div>

<p>ลองเป่าเทียนดูสิ</p>

<button onclick="openPopup()">เปิดจดหมาย 💌</button>

<button onclick="playMusic()">เปิดเพลง 🎵</button>

</div>

<!-- popup -->

<div class="popup" id="popup">

<div class="popup-box">

<h2>ถึงคุณมีนา 💖</h2>

<p>

สุขสันต์วันเกิดนะ 🎂<br><br>

ขอให้ปีนี้มีแต่รอยยิ้ม<br>
มีความสุขมาก ๆ<br>
และมีเรื่องดี ๆ เข้ามาเยอะ ๆ<br><br>

ขอบคุณที่เข้ามาในชีวิตเรานะ :)

</p>

<button onclick="closePopup()">กลับหน้าหลัก</button>

</div>

</div>

<iframe id="music" width="0" height="0" allow="autoplay"></iframe>

<script>

/* popup */

function openPopup(){
document.getElementById("popup").classList.add("active");
}

function closePopup(){
document.getElementById("popup").classList.remove("active");
}

/* music */

function playMusic(){
document.getElementById("music").src="https://www.youtube.com/embed/IpFX2vq8HKw?autoplay=1";
}

/* floating hearts */

function createHeart(){

let heart=document.createElement("div");

heart.className="heart";

heart.innerHTML="❤";

heart.style.left=Math.random()*100+"vw";

heart.style.fontSize=(Math.random()*25+18)+"px";

document.body.appendChild(heart);

setTimeout(()=>heart.remove(),6000);

}

setInterval(createHeart,500);

</script>

</body>
</html>
