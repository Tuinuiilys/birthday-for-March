<!DOCTYPE html>
<html lang="th">
<head>

<meta charset="UTF-8">
<title>Happy Birthday คุณมีนา</title>

<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Prompt:wght@300;400&display=swap" rel="stylesheet">

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
font-family:'Prompt',sans-serif;
overflow:hidden;

/* พื้นหลัง gradient เคลื่อนไหว */

background:linear-gradient(-45deg,#ffd6ec,#ffeaf6,#ffc2de,#ffe0f2);
background-size:400% 400%;
animation:bgmove 10s infinite linear;
}

@keyframes bgmove{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

/* กล่องหลัก */

.container{
z-index:2;
animation:fade 1.5s;
}

@keyframes fade{
from{opacity:0;transform:translateY(20px)}
to{opacity:1}
}

/* รูป */

.photo{
width:280px;
height:280px;
border-radius:50%;
object-fit:cover;
border:8px solid white;
box-shadow:0 0 30px rgba(255,0,120,.5);
margin-bottom:20px;
animation:float 4s ease-in-out infinite;
}

@keyframes float{
0%,100%{transform:translateY(0)}
50%{transform:translateY(-15px)}
}

/* หัวข้อ */

.title{
font-family:'Pacifico';
font-size:60px;
color:#ff2d75;
}

.subtitle{
font-size:36px;
color:#ff4f9f;
}

/* เค้ก */

.cake{
font-size:110px;
animation:bounce 1.2s infinite alternate;
}

@keyframes bounce{
from{transform:translateY(0)}
to{transform:translateY(-18px)}
}

/* ปุ่ม */

button{
padding:12px 30px;
font-size:18px;
border:none;
border-radius:30px;
background:#ff4f9f;
color:white;
cursor:pointer;
margin:10px;
transition:.3s;
}

button:hover{
background:#ff2d75;
transform:scale(1.1);
}

/* popup เต็มจอ */

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
display:flex;
justify-content:center;
align-items:center;
visibility:hidden;
opacity:0;
transition:.4s;
}

.popup.active{
visibility:visible;
opacity:1;
}

.popup-content{
background:white;
padding:40px;
border-radius:20px;
width:400px;
text-align:center;
box-shadow:0 20px 40px rgba(0,0,0,.4);
animation:pop .4s;
}

@keyframes pop{
from{transform:scale(.6)}
to{transform:scale(1)}
}

.popup-content h2{
font-family:'Pacifico';
color:#ff2d75;
}

.popup-content p{
color:#555;
font-size:18px;
}

.backbtn{
margin-top:20px;
}

/* hearts */

.heart{
position:absolute;
color:#ff4f9f;
font-size:22px;
animation:heartFloat 6s linear infinite;
}

@keyframes heartFloat{
0%{transform:translateY(100vh);opacity:0}
100%{transform:translateY(-10vh);opacity:1}
}

/* stars */

.star{
position:absolute;
color:gold;
font-size:20px;
animation:twinkle 2s infinite;
}

@keyframes twinkle{
0%,100%{opacity:.3}
50%{opacity:1}
}

</style>

</head>

<body>

<div class="container">

<img class="photo" src="meena1.jpg">

<h1 class="title">Happy Birthday 🎂</h1>

<h2 class="subtitle">คุณมีนา</h2>

<div class="cake">🎂</div>

<p>ลองเป่าเทียนดูสิ</p>

<button onclick="openPopup()">เปิดจดหมาย 💌</button>

<button onclick="playMusic()">เปิดเพลง 🎵</button>

</div>

<!-- popup -->

<div class="popup" id="popup">

<div class="popup-content">

<h2>ถึงคุณมีนา 💖</h2>

<p>

สุขสันต์วันเกิดนะ 🎂  
วันนี้เป็นวันพิเศษของคุณ  

เราขอให้ปีนี้เป็นปีที่ดี  
มีรอยยิ้ม มีความสุข  
และมีเรื่องดี ๆ เข้ามาเยอะ ๆ  

ขอบคุณที่เข้ามาในชีวิตเรานะ :)

</p>

<button class="backbtn" onclick="closePopup()">กลับหน้าหลัก</button>

</div>

</div>

<iframe id="music" width="0" height="0" allow="autoplay"></iframe>

<script>

/* popup */

function openPopup(){
document.getElementById("popup").classList.add("active");
}

function closePopup(){
document.getElementById("popup").classList.remove("active");
}

/* เพลง */

function playMusic(){
document.getElementById("music").src="https://www.youtube.com/embed/IpFX2vq8HKw?autoplay=1";
}

/* hearts */

function createHeart(){

let heart=document.createElement("div");

heart.className="heart";

heart.innerHTML="❤";

heart.style.left=Math.random()*100+"vw";

heart.style.fontSize=(Math.random()*20+20)+"px";

document.body.appendChild(heart);

setTimeout(()=>heart.remove(),6000);

}

setInterval(createHeart,400);

/* stars */

function createStar(){

let star=document.createElement("div");

star.className="star";

star.innerHTML="✨";

star.style.left=Math.random()*100+"vw";

star.style.top=Math.random()*100+"vh";

document.body.appendChild(star);

setTimeout(()=>star.remove(),2000);

}

setInterval(createStar,300);

</script>

</body>
</html>
