<!DOCTYPE html>
<html lang="th">
<head>

<meta charset="UTF-8">
<title>Happy Birthday คุณมีนา</title>

<link href="https://fonts.googleapis.com/css2?family=Sriracha&family=Prompt:wght@300&display=swap" rel="stylesheet">

<style>

body{
margin:0;
height:100vh;
background:linear-gradient(135deg,#ffd6ec,#ffeaf6);
display:flex;
justify-content:center;
align-items:center;
text-align:center;
font-family:'Prompt',sans-serif;
overflow:hidden;
}

.container{
z-index:2;
}

h1{
font-family:'Sriracha',cursive;
font-size:55px;
color:#ff2d75;
}

h2{
font-family:'Sriracha',cursive;
font-size:38px;
color:#ff4f9f;
}

.photo{
width:200px;
height:200px;
border-radius:50%;
object-fit:cover;
border:6px solid white;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
margin-bottom:20px;
}

button{
padding:12px 25px;
font-size:18px;
border:none;
border-radius:30px;
background:#ff4f9f;
color:white;
cursor:pointer;
margin:10px;
}

button:hover{
background:#ff2d75;
}

.cake{
font-size:100px;
margin-top:10px;
}

.candle{
font-size:40px;
cursor:pointer;
}

.letter{
display:none;
background:white;
padding:20px;
border-radius:15px;
width:280px;
margin:20px auto;
box-shadow:0 10px 20px rgba(0,0,0,0.2);
font-family:'Sriracha',cursive;
color:#ff2d75;
}

.heart{
position:absolute;
color:#ff4f9f;
font-size:20px;
animation:float 6s linear infinite;
}

@keyframes float{
0%{
transform:translateY(100vh);
opacity:0;
}
100%{
transform:translateY(-10vh);
opacity:1;
}
}

</style>

</head>

<body>

<div class="container">

<img class="photo" src="meena1.jpg">

<h1>Happy Birthday 🎂</h1>
<h2>คุณมีนา</h2>

<div class="cake">🎂</div>

<div class="candle" onclick="blowCandle()">🕯</div>

<p>ลองเป่าเทียนดูสิ</p>

<button onclick="openLetter()">เปิดจดหมาย 💌</button>

<button onclick="playMusic()">เปิดเพลง 🎵</button>

<div class="letter" id="letter">

สุขสันต์วันเกิดนะคุณมีนา 🌸  

ขอให้ปีนี้เป็นปีที่ดีสำหรับคุณ  
มีความสุขเยอะ ๆ  
ยิ้มเยอะ ๆ  

แล้วก็…  
ขอบคุณที่เข้ามาในชีวิตเรานะ :)

</div>

</div>

<iframe id="music"
width="0"
height="0"
src=""
allow="autoplay">
</iframe>

<script>

function blowCandle(){

document.querySelector(".candle").innerHTML="💨";

alert("เป่าเทียนแล้ว ขอพรได้เลย 🎂");

}

function openLetter(){

document.getElementById("letter").style.display="block";

}

function playMusic(){

document.getElementById("music").src="https://www.youtube.com/embed/IpFX2vq8HKw?autoplay=1";

}

function createHeart(){

const heart=document.createElement("div");

heart.classList.add("heart");

heart.innerHTML="❤";

heart.style.left=Math.random()*100+"vw";

heart.style.fontSize=(Math.random()*20+20)+"px";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},6000);

}

setInterval(createHeart,300);

</script>

</body>
</html>
