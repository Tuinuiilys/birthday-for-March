<!DOCTYPE html>
<html lang="th">
<head>

<meta charset="UTF-8">
<title>Happy Birthday คุณมีนา</title>

<link href="https://fonts.googleapis.com/css2?family=Sriracha&family=Prompt:wght@300;400&display=swap" rel="stylesheet">

<style>

body{
margin:0;
height:100vh;
background:linear-gradient(135deg,#ffd6ec,#ffeaf6);
display:flex;
justify-content:center;
align-items:center;
text-align:center;
font-family:'Prompt',sans-serif;
overflow:hidden;
}

/* กล่องหลัก */

.container{
z-index:2;
animation:fadeIn 2s;
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(20px)}
to{opacity:1}
}

/* หัวข้อ */

h1{
font-family:'Sriracha';
font-size:55px;
color:#ff2d75;
margin-bottom:0;
}

h2{
font-family:'Sriracha';
font-size:38px;
color:#ff4f9f;
margin-top:0;
}

/* รูป */

.photo{
width:200px;
height:200px;
border-radius:50%;
object-fit:cover;
border:6px solid white;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
margin-bottom:20px;
animation:float 4s ease-in-out infinite;
}

@keyframes float{
0%,100%{transform:translateY(0)}
50%{transform:translateY(-10px)}
}

/* ปุ่ม */

button{
padding:12px 25px;
font-size:18px;
border:none;
border-radius:30px;
background:#ff4f9f;
color:white;
cursor:pointer;
margin:10px;
transition:.3s;
}

button:hover{
background:#ff2d75;
transform:scale(1.1);
}

/* เค้ก */

.cake{
font-size:100px;
animation:bounce 1.2s infinite alternate;
}

@keyframes bounce{
from{transform:translateY(0)}
to{transform:translateY(-15px)}
}

/* เทียน */

.candle{
font-size:40px;
cursor:pointer;
}

/* จดหมาย */

.letter{
display:none;
background:white;
padding:20px;
border-radius:15px;
width:280px;
margin:20px auto;
box-shadow:0 10px 20px rgba(0,0,0,0.2);
font-family:'Sriracha';
color:#ff2d75;
animation:popup .5s;
}

@keyframes popup{
from{transform:scale(.6);opacity:0}
to{transform:scale(1)}
}

/* หัวใจ */

.heart{
position:absolute;
color:#ff4f9f;
font-size:20px;
animation:floatHeart 6s linear infinite;
}

@keyframes floatHeart{
0%{transform:translateY(100vh);opacity:0}
100%{transform:translateY(-10vh);opacity:1}
}

/* ดาว */

.star{
position:absolute;
color:gold;
font-size:18px;
animation:twinkle 2s infinite;
}

@keyframes twinkle{
0%,100%{opacity:.2}
50%{opacity:1}
}

</style>

</head>

<body>

<div class="container">

<img class="photo" src="meena1.jpg">

<h1>Happy Birthday 🎂</h1>
<h2>คุณมีนา</h2>

<div class="cake">🎂</div>

<div class="candle" onclick="blowCandle()">🕯</div>

<p>ลองเป่าเทียนดูสิ</p>

<button onclick="openLetter()">เปิดจดหมาย 💌</button>

<button onclick="playMusic()">เปิดเพลง 🎵</button>

<div class="letter" id="letter">

สุขสันต์วันเกิดนะคุณมีนา 🌸  
ขอให้ปีนี้เป็นปีที่ดีสำหรับคุณ  
มีรอยยิ้มเยอะ ๆ มีความสุขมาก ๆ  

ขอบคุณที่เข้ามาในชีวิตเรานะ :)

</div>

</div>

<iframe id="music" width="0" height="0" allow="autoplay"></iframe>

<script>

/* เป่าเทียน */

function blowCandle(){
document.querySelector(".candle").innerHTML="💨";
}

/* เปิดจดหมาย */

function openLetter(){
document.getElementById("letter").style.display="block";
}

/* เพลง */

function playMusic(){
document.getElementById("music").src="https://www.youtube.com/embed/IpFX2vq8HKw?autoplay=1";
}

/* หัวใจลอย */

function createHeart(){

const heart=document.createElement("div");
heart.classList.add("heart");
heart.innerHTML="❤";

heart.style.left=Math.random()*100+"vw";
heart.style.fontSize=(Math.random()*20+20)+"px";

document.body.appendChild(heart);

setTimeout(()=>heart.remove(),6000);

}

setInterval(createHeart,400);

/* ดาว */

function createStar(){

const star=document.createElement("div");
star.classList.add("star");
star.innerHTML="✨";

star.style.left=Math.random()*100+"vw";
star.style.top=Math.random()*100+"vh";

document.body.appendChild(star);

setTimeout(()=>star.remove(),2000);

}

setInterval(createStar,300);

</script>

</body>
</html>
