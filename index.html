<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Happy Birthday คุณมีนา</title>

<link href="https://fonts.googleapis.com/css2?family=Sriracha&family=Prompt:wght@300;400&display=swap" rel="stylesheet">

<style>

body{
margin:0;
overflow:hidden;
background:linear-gradient(135deg,#ffd6ec,#ffeaf6);
font-family:'Prompt',sans-serif;
text-align:center;
}

h1{
font-family:'Sriracha';
font-size:50px;
color:#ff2d75;
margin-top:30px;
}

.photo{
width:200px;
height:200px;
border-radius:50%;
object-fit:cover;
border:6px solid white;
box-shadow:0 10px 30px rgba(0,0,0,.2);
display:none;
position:relative;
z-index:2;
}

/* 3D gift */

.scene{
width:120px;
height:120px;
margin:30px auto;
perspective:800px;
cursor:pointer;
}

.box{
width:100%;
height:100%;
position:relative;
transform-style:preserve-3d;
transition:1s;
}

.box.open{
transform:rotateX(120deg);
}

.face{
position:absolute;
width:100%;
height:100%;
background:#ff4f9f;
border:3px solid white;
}

.top{
transform-origin:top;
}

/* cake */

.cake{
font-size:80px;
display:none;
}

.candles span{
font-size:30px;
margin:2px;
}

/* hearts */

.heart{
position:absolute;
color:#ff4f9f;
font-size:22px;
animation:shoot 2s forwards;
}

@keyframes shoot{
0%{transform:scale(.5);opacity:1}
100%{transform:translateY(-200px) scale(1.8);opacity:0}
}

/* envelope */

.envelope{
font-size:60px;
cursor:pointer;
margin-top:20px;
}

.letter{
display:none;
background:white;
width:280px;
margin:auto;
padding:20px;
border-radius:15px;
box-shadow:0 10px 20px rgba(0,0,0,.2);
font-family:'Sriracha';
color:#ff2d75;
}

/* stars */

.star{
position:absolute;
color:gold;
font-size:18px;
animation:twinkle 2s infinite;
}

@keyframes twinkle{
0%,100%{opacity:.2}
50%{opacity:1}
}

canvas{
position:fixed;
top:0;
left:0;
pointer-events:none;
}

button{
padding:10px 20px;
border:none;
border-radius:25px;
background:#ff4f9f;
color:white;
margin:5px;
cursor:pointer;
}

</style>
</head>

<body>

<canvas id="fireworks"></canvas>

<h1>Happy Birthday 🎂</h1>
<h2>คุณมีนา</h2>

<div class="scene" onclick="openGift()">
<div class="box" id="box">
<div class="face"></div>
</div>
</div>

<img src="meena.jpg" id="photo" class="photo">

<div class="cake" id="cake">
🎂
<div class="candles" id="candles"></div>
</div>

<br>

<button onclick="blow()">เป่าเทียน</button>
<button onclick="heartBurst()">ส่งหัวใจ</button>
<button onclick="playMusic()">เปิดเพลง</button>

<div class="envelope" onclick="openLetter()">💌</div>

<div class="letter" id="letter">
สุขสันต์วันเกิดนะคุณมีนา 🌸  
ขอให้ปีนี้เป็นปีที่ดีสำหรับคุณ  
มีรอยยิ้มเยอะ ๆ  
และมีความสุขทุกวันนะ :)
</div>

<iframe id="music" width="0" height="0"></iframe>

<script>

/* open gift */

function openGift(){

document.getElementById("box").classList.add("open");

document.getElementById("photo").style.display="block";

document.getElementById("cake").style.display="block";

createCandles();

startFireworks();

}

/* candles */

function createCandles(){

let c=document.getElementById("candles");

for(let i=0;i<6;i++){

let s=document.createElement("span");

s.innerHTML="🕯";

c.appendChild(s);

}

}

function blow(){

document.querySelectorAll("#candles span").forEach(c=>c.innerHTML="💨");

}

/* heart burst */

function heartBurst(){

for(let i=0;i<40;i++){

let h=document.createElement("div");

h.className="heart";

h.innerHTML="❤";

h.style.left=(window.innerWidth/2)+"px";

h.style.top="300px";

document.body.appendChild(h);

setTimeout(()=>h.remove(),2000);

}

}

/* stars */

setInterval(()=>{

let star=document.createElement("div");

star.className="star";

star.innerHTML="✨";

star.style.left=Math.random()*100+"vw";

star.style.top=Math.random()*100+"vh";

document.body.appendChild(star);

setTimeout(()=>star.remove(),2000);

},200);

/* letter */

function openLetter(){

document.getElementById("letter").style.display="block";

}

/* music */

function playMusic(){

document.getElementById("music").src=
"https://www.youtube.com/embed/IpFX2vq8HKw?autoplay=1";

}

/* fireworks */

const canvas=document.getElementById("fireworks");

const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;

canvas.height=window.innerHeight;

let particles=[];

function startFireworks(){

setInterval(()=>{

for(let i=0;i<30;i++){

particles.push({

x:canvas.width/2,

y:canvas.height/2,

vx:(Math.random()-0.5)*6,

vy:(Math.random()-0.5)*6,

life:60

});

}

},800);

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

particles.forEach((p,i)=>{

p.x+=p.vx;

p.y+=p.vy;

p.life--;

ctx.fillStyle="pink";

ctx.beginPath();

ctx.arc(p.x,p.y,3,0,Math.PI*2);

ctx.fill();

if(p.life<=0)particles.splice(i,1);

});

requestAnimationFrame(draw);

}

draw();

</script>

</body>
</html>
