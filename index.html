<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Happy Birthday คุณมีนา</title>

<link href="https://fonts.googleapis.com/css2?family=Sriracha&family=Prompt:wght@300;400&display=swap" rel="stylesheet">

<style>

body{
margin:0;
overflow:hidden;
background:linear-gradient(135deg,#ffd6ec,#ffeaf6);
font-family:'Prompt',sans-serif;
text-align:center;
}

h1{
font-family:'Sriracha';
font-size:48px;
color:#ff2d75;
}

.gallery{
width:220px;
margin:auto;
position:relative;
}

.gallery img{
width:220px;
height:220px;
border-radius:50%;
object-fit:cover;
border:6px solid white;
box-shadow:0 10px 30px rgba(0,0,0,.2);
}

button{
padding:10px 20px;
border:none;
border-radius:25px;
background:#ff4f9f;
color:white;
margin:5px;
cursor:pointer;
}

.cake{
font-size:80px;
}

.candles span{
font-size:30px;
margin:2px;
}

.heart{
position:absolute;
color:#ff4f9f;
font-size:22px;
animation:fly 2s forwards;
}

@keyframes fly{
0%{transform:scale(.5)}
100%{transform:translateY(-200px) scale(1.8);opacity:0}
}

canvas{
position:fixed;
top:0;
left:0;
pointer-events:none;
}

.confetti{
position:absolute;
width:6px;
height:6px;
background:red;
animation:fall 3s linear forwards;
}

@keyframes fall{
to{transform:translateY(500px) rotate(720deg)}
}

</style>
</head>

<body>

<h1>Happy Birthday 🎂</h1>
<h2>คุณมีนา</h2>

<div class="gallery">
<img id="photo" src="meena1.jpg">
</div>

<br>

<div class="cake">🎂</div>
<div class="candles" id="candles"></div>

<button onclick="startMic()">🎤 เป่าเทียน</button>
<button onclick="heartFromPhoto()">💘 ส่งหัวใจ</button>
<button onclick="playMusic()">🎵 เปิดเพลง</button>

<br>

<button onclick="openGift()">🎁 เปิดของขวัญ</button>

<br>

<button onclick="startGame()">🎮 Mini Game</button>
<span id="score">0</span>

<canvas id="fireworks"></canvas>

<iframe id="music" width="0" height="0"></iframe>

<script>

/* gallery */

let images=["meena1.jpg","meena2.jpg","meena3.jpg"];
let index=0;

setInterval(()=>{
index=(index+1)%images.length;
document.getElementById("photo").src=images[index];
},3000);

/* candles */

let candles=document.getElementById("candles");

for(let i=0;i<6;i++){
let s=document.createElement("span");
s.innerHTML="🕯";
candles.appendChild(s);
}

/* mic blow */

function startMic(){

navigator.mediaDevices.getUserMedia({audio:true})
.then(stream=>{

const audioCtx=new AudioContext();
const mic=audioCtx.createMediaStreamSource(stream);
const analyser=audioCtx.createAnalyser();

mic.connect(analyser);

let data=new Uint8Array(analyser.frequencyBinCount);

function detect(){
analyser.getByteFrequencyData(data);
let volume=data.reduce((a,b)=>a+b)/data.length;

if(volume>80){
document.querySelectorAll("#candles span")
.forEach(c=>c.innerHTML="💨");
}

requestAnimationFrame(detect);
}

detect();

});

}

/* hearts */

function heartFromPhoto(){

let rect=document.getElementById("photo").getBoundingClientRect();

for(let i=0;i<20;i++){

let h=document.createElement("div");

h.className="heart";

h.innerHTML="❤";

h.style.left=rect.left+rect.width/2+"px";

h.style.top=rect.top+rect.height/2+"px";

document.body.appendChild(h);

setTimeout(()=>h.remove(),2000);

}

}

/* confetti */

function openGift(){

for(let i=0;i<100;i++){

let c=document.createElement("div");

c.className="confetti";

c.style.left=Math.random()*window.innerWidth+"px";

c.style.background=
`hsl(${Math.random()*360},80%,60%)`;

document.body.appendChild(c);

setTimeout(()=>c.remove(),3000);

}

startFireworks();

}

/* fireworks */

const canvas=document.getElementById("fireworks");

const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;

canvas.height=window.innerHeight;

let particles=[];

function startFireworks(){

setInterval(()=>{

for(let i=0;i<40;i++){

particles.push({

x:Math.random()*canvas.width,

y:Math.random()*canvas.height/2,

vx:(Math.random()-0.5)*6,

vy:(Math.random()-0.5)*6,

life:80,

color:`hsl(${Math.random()*360},100%,60%)`

});

}

},1000);

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

particles.forEach((p,i)=>{

p.x+=p.vx;
p.y+=p.vy;
p.life--;

ctx.fillStyle=p.color;

ctx.beginPath();
ctx.arc(p.x,p.y,3,0,Math.PI*2);
ctx.fill();

if(p.life<=0)particles.splice(i,1);

});

requestAnimationFrame(draw);

}

draw();

/* music */

function playMusic(){

document.getElementById("music").src=
"https://www.youtube.com/embed/IpFX2vq8HKw?autoplay=1";

}

/* mini game */

let score=0;

function startGame(){

let heart=document.createElement("div");

heart.className="heart";

heart.innerHTML="💖";

heart.style.left=Math.random()*window.innerWidth+"px";

heart.style.top=Math.random()*window.innerHeight+"px";

heart.onclick=()=>{

score++;

document.getElementById("score").innerText=score;

heart.remove();

};

document.body.appendChild(heart);

}

</script>

</body>
</html>
